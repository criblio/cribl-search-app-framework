name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  app-utils:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/app-utils/package-lock.json
      - run: npm ci
        working-directory: packages/app-utils
      - run: npm test
        working-directory: packages/app-utils
      - run: npm run typecheck
        working-directory: packages/app-utils
  app-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/app-tooling/package-lock.json
      - run: npm ci
        working-directory: packages/app-tooling
      - run: npm test
        working-directory: packages/app-tooling
      - run: npm run audit
        working-directory: packages/app-tooling
