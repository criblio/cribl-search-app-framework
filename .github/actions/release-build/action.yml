name: Build and verify Cribl App release artifact
description: Run the canonical framework-pinned verification and packaging pipeline
inputs:
  framework-sha:
    description: Full cribl-search-app-framework commit SHA to clone
    required: true
runs:
  using: composite
  steps:
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22'
        cache: npm
    - name: Clone shared framework at recorded commit
      shell: bash
      run: |
        set -euo pipefail
        SHA='${{ inputs.framework-sha }}'
        test "$SHA" != "" || { echo "::error::framework-sha is empty"; exit 1; }
        test "$(tr -d '[:space:]' < .framework-sha)" = "$SHA" || {
          echo "::error::action input does not match .framework-sha"
          exit 1
        }
        git clone --filter=blob:none https://github.com/criblio/cribl-search-app-framework.git ../cribl-search-app-framework
        git -C ../cribl-search-app-framework checkout --detach "$SHA"
        test "$(git -C ../cribl-search-app-framework rev-parse HEAD)" = "$SHA"
    - name: Install locked dependencies
      shell: bash
      run: |
        set -euo pipefail
        npm --prefix ../cribl-search-app-framework/packages/app-utils ci
        npm --prefix ../cribl-search-app-framework/packages/app-tooling ci
        npm ci
    - name: Verify source
      shell: bash
      run: npm run verify
    - name: Supply-chain gates
      shell: bash
      run: npm run security:static && npm run audit
    - name: Build candidate exactly once
      shell: bash
      run: npm run package
    - name: Inspect candidate and create release evidence
      shell: bash
      run: npm run release:evidence
