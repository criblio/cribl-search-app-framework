name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone shared framework
        run: git clone --depth 1 https://github.com/criblio/cribl-search-app-framework.git ../cribl-search-app-framework
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install framework deps
        run: cd ../cribl-search-app-framework/packages/app-utils && npm ci
      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
      - run: npm ci
      - run: npm run lint
      - run: npm run package
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.tgz
          generate_release_notes: true
          fail_on_unmatched_files: true
