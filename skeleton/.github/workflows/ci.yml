name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: criblio/cribl-search-app-framework/.github/actions/release-build@24885e7464cf86143b4268003c7bbce76371a55c
        with:
          framework-sha: 24885e7464cf86143b4268003c7bbce76371a55c
      - name: Retain exact tested candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate-${{ github.sha }}
          path: build/*
          if-no-files-found: error
          retention-days: 14
