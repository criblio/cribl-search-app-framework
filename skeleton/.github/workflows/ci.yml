name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone shared framework
        run: git clone --depth 1 https://github.com/criblio/cribl-search-app-framework.git ../cribl-search-app-framework
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install framework deps
        run: cd ../cribl-search-app-framework/packages/app-utils && npm ci
      - run: npm ci
      - run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Type check
        run: npx tsc --noEmit
      - run: npm run build
